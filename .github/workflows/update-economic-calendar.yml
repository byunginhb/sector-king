name: Update Economic Calendar

# 경제 캘린더(FRED 미국 지표 발표일정) 자동수집.
# Actions 는 얇은 스케줄러 — 실제 수집·upsert 로직은 서버 크론 엔드포인트가 수행.
# 발표일정은 자주 바뀌지 않으므로 하루 1회(평일 KST 06:00 = UTC 21:00) 로 충분.

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

concurrency:
  group: update-economic-calendar
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET secret 이 등록되지 않았습니다"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_TARGET_URL }}" ]; then
            echo "::error::CRON_TARGET_URL secret 이 등록되지 않았습니다 (예: https://sector-king.com)"
            exit 1
          fi

      - name: Call economic-calendar sync endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_TARGET_URL: ${{ secrets.CRON_TARGET_URL }}
        run: |
          set -euo pipefail
          echo "POST ${CRON_TARGET_URL}/api/cron/economic-calendar-sync"
          HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            "${CRON_TARGET_URL}/api/cron/economic-calendar-sync" \
            -d '{}')
          echo "HTTP ${HTTP_CODE}"
          cat /tmp/resp.json || true
          echo
          if [ "${HTTP_CODE}" -ge 400 ]; then
            echo "::error::economic-calendar sync endpoint 호출 실패 (HTTP ${HTTP_CODE})"
            exit 1
          fi
